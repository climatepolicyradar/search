name: Run tests
description: Free disk, checkout with LFS, install deps, and run the functional test suite.

# Invoked as a single guarded step so the calling job runs unconditionally and
# concludes success/failure but never `skipped` — see merge_to_main.yml for why
# that matters (the deploy closure).
runs:
  using: composite
  steps:
    # The e2e tests run Vespa in a container; Vespa feed blocks (HTTP 507) once
    # disk usage crosses ~75%. ubuntu-latest only ships ~14GB free.
    # This reclaims space from preinstalled tooling before the tests run.
    - uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        large-packages: false # removing these is slow and not needed here

    - name: Check out repository code
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install just
      uses: extractions/setup-just@v4

    - name: Install python or load from cache with dependencies
      uses: actions/setup-python@v6
      with:
        python-version-file: pyproject.toml

    - name: Install dependencies
      shell: bash
      run: just install

    - name: Run tests
      shell: bash
      run: just test-functional
      env:
        VESPA_ENDPOINT: http://localhost:8080/
        VESPA_READ_TOKEN: ""
