name: Merge to Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

# There is a lot of services deployed in this workflow, so this avoids
# deploying over each other by using concurrent runs (cancel-in-progress: false)
# We could use merge queues, but that is a little more inferred than explicit
concurrency:
  group: merge-to-main
  cancel-in-progress: false

permissions:
  contents: write
  # needed for reading the OIDC token and assuming the role
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run-test: ${{ steps.filter.outputs.run-test }}
      run-pulumi-up: ${{ steps.filter.outputs.run-pulumi-up }}
      run-deploy: ${{ steps.filter.outputs.run-deploy }}
      run-vespa-deploy: ${{ steps.filter.outputs.run-vespa-deploy }}
      run-prefect-deploy: ${{ steps.filter.outputs.run-prefect-deploy }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            run-test:
              - 'api/**'
              - 'relevance_tests/**'
              - 'search/**'
              - 'tests/**'
              - 'vespa/**'
              - 'uv.lock'
              - pyproject.toml
            run-pulumi-up:
              - 'infra/**'
            run-deploy:
              - 'api/**'
              - 'search/**'
            run-vespa-deploy:
              - 'vespa/app/**'
            run-prefect-deploy:
              - 'deployments.py'
              - 'prefect/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'online_metrics/**'
              - 'relevance_tests/**'
              - 'search/vespa/**'

  lint:
    permissions:
      # For trunk to post annotations
      checks: write
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Install python or load from cache with dependencies
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: just install
      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
        with:
          arguments: --ci

  test:
    runs-on: ubuntu-latest
    name: Test
    needs: [changes]
    if: needs.changes.outputs.run-test == 'true'
    steps:
      # The e2e tests run Vespa in a container; Vespa feed blocks (HTTP 507) once
      # disk usage crosses ~75%. ubuntu-latest only ships ~14GB free.
      # This reclaims space from preinstalled tooling before the tests run.
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false # removing these is slow and not needed here

      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install python or load from cache with dependencies
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: just install

      - name: Run tests
        run: just test-functional
        env:
          VESPA_ENDPOINT: http://localhost:8080/
          VESPA_READ_TOKEN: ""

  # This is the job that is required in our branch protection rules.
  # As `test` runs on a conditional it might not run, so we need to
  # accumulate the results here.
  tests:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      # You can see the possible values here:
      # @see: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#jobs-context
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
  deploy-api-apprunner-deprecated:
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    needs: [changes, tests]
    if: needs.changes.outputs.run-deploy == 'true'

  # @see: https://github.com/marketplace/actions/amazon-ecs-deploy-express-service-action-for-github-actions#complete-example-with-all-options
  deploy-api:
    uses: ./.github/workflows/deploy_api.yml
    secrets: inherit
    needs: [changes, tests]
    if: needs.changes.outputs.run-deploy == 'true'

  deploy-prefect:
    uses: ./.github/workflows/prefect_deploy.yml
    needs: [changes, tests]
    if: ${{ needs.changes.outputs.run-prefect-deploy == 'true' }}
    secrets: inherit

  vespa-deploy:
    uses: ./.github/workflows/vespa_deploy.yml
    secrets: inherit
    needs: [changes, tests]
    if: needs.changes.outputs.run-vespa-deploy == 'true'

  pulumi-up:
    uses: ./.github/workflows/pulumi_up.yml
    secrets: inherit
    needs: [changes]
    if: needs.changes.outputs.run-pulumi-up == 'true'
    with:
      environment: production
