name: Vespa Feeder Deploy

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  # needed for reading the OIDC token and assuming the role
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./vespa-feeder
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-production-github-actions
          role-session-name: GithubSearchVespaFeederDeploy
          aws-region: eu-west-1
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml
      - uses: extractions/setup-just@v4
      - run: just build
      - run: just push
      - env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
        run: just deploy
