name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  # needed for reading the OIDC token and assuming the role
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run-test: ${{ steps.filter.outputs.run-test }}
      run-check-scripts-structure: ${{ steps.filter.outputs.run-check-scripts-structure }}
      run-pulumi-preview: ${{ steps.filter.outputs.run-pulumi-preview }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            run-test:
              - 'api/**'
              - 'relevance_tests/**'
              - 'search/**'
              - 'tests/**'
              - 'vespa/**'
              - 'uv.lock'
              - pyproject.toml
            run-check-scripts-structure:
              - 'scripts/**'
            run-pulumi-preview:
              - 'infra/**'

  lint:
    permissions:
      # For trunk to post annotations
      checks: write
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Install python or load from cache with dependencies
        uses: actions/setup-python@v7
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: just install
      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
        with:
          arguments: --ci

  check-scripts-structure:
    runs-on: ubuntu-latest
    name: Check scripts directory
    needs: [changes]
    if: needs.changes.outputs.run-check-scripts-structure == 'true'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Check there are no .py files in scripts/ root
        run: |
          if ls scripts/*.py 2>/dev/null; then
            echo "❌ Error: Found .py files in scripts/ root directory:"
            ls scripts/*.py
            echo ""
            echo "Python files must be placed in subdirectories under scripts/, not in the root."
            exit 1
          else
            echo "✅ No .py files found in scripts/ root directory"
          fi

  test:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      # The conditional is on this composite action, so that the step always runs, and can be `needed` by subsequent jobs.
      # If the job was conditional, it would be `skipped`, and thus subsequent steps, and any steps in its closure would be considered skipped top.
      # @see: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-jobs#:~:text=If%20a%20run%20contains%20a%20series%20of%20jobs%20that%20need%20each%20other%2C%20a%20failure%20or%20skip%20applies%20to%20all%20jobs%20in%20the%20dependency%20chain%20from%20the%20point%20of%20failure%20or%20skip%20onwards
      # @see: https://github.com/climatepolicyradar/search/pull/356
      # We use a composite action to avoid needing to run the conditional on each step in this job, which would be verbose and error-prone.
      - uses: actions/checkout@v7
      - if: needs.changes.outputs.run-test == 'true'
        uses: ./.github/actions/test

  pulumi-preview:
    runs-on: ubuntu-latest
    name: Pulumi Preview
    needs: [changes]
    if: needs.changes.outputs.run-pulumi-preview == 'true'
    strategy:
      matrix:
        environment: [production]
      fail-fast: false
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-${{ matrix.environment }}-github-actions
          role-session-name: GitHub_Pulumi_up_${{ matrix.environment }}
          aws-region: eu-west-1
      - uses: astral-sh/setup-uv@v7
      - uses: extractions/setup-just@v4
      - run: just install
      - uses: pulumi/actions@v7
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      - working-directory: ./infra
        # we reset the aws:profile as the above uses AWS env variables set in the `aws-actions/configure-aws-credentials@v5` step
        run: |
          pulumi preview --stack climatepolicyradar/search/${{ matrix.environment }} --suppress-outputs --config aws:profile=
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  dependabot:
    name: Dependabot Auto-pilot
    needs: [lint, test]
    permissions:
      pull-requests: write
      contents: write
    uses: climatepolicyradar/reusable-workflows/.github/workflows/dependabot-autopilot.yml@v23
