name: Deploy API (ECS)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  # needed for reading the OIDC token and assuming the role
  id-token: write

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: eu-west-1
      DOCKER_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-production-github-actions
          role-session-name: GitHub_Deploy_API_ECS
          aws-region: eu-west-1
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: extractions/setup-just@v4
      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml
      - run: just build-image
      # Push :latest for humans/runtime, plus the commit SHA as an immutable tag
      # so each deploy gets a unique image reference (otherwise ECS Express may
      # see no diff and skip rolling a new deployment).
      - run: just push-image "${{ github.sha }}"
      - id: deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          # The live API runs in the `search` cluster. There is also an orphan
          # `default/search-api` service (0 running tasks) which previous runs
          # were silently deploying to.
          cluster: search
          service-name: search-api
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/search-api:${{ github.sha }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-api-ecs-task-execution-role
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-api-ecs-infrastructure-role

      # The express-service action above can silently return success when:
      #   * its 15-minute poll loop times out (only logs a warning),
      #   * the deployment rolls back (it does not recognise ROLLBACK_* states),
      #   * the polling loop swallows transient SDK errors.
      # This step re-queries the most recent deployment and fails the job
      # unless it actually reached SUCCESSFUL.
      - name: Verify deployment outcome
        env:
          SERVICE_ARN: ${{ steps.deploy.outputs.service-arn }}
        run: |
          set -euo pipefail
          if [[ -z "${SERVICE_ARN}" ]]; then
            echo "::error::deploy step did not emit a service-arn output"
            exit 1
          fi
          echo "Looking up most recent deployment for ${SERVICE_ARN}"
          DEPLOY_ARN=$(aws ecs list-service-deployments \
            --cluster search \
            --service "${SERVICE_ARN}" \
            --query 'serviceDeployments[0].serviceDeploymentArn' \
            --output text)
          if [[ -z "${DEPLOY_ARN}" || "${DEPLOY_ARN}" == "None" ]]; then
            echo "::error::Could not find a service deployment for ${SERVICE_ARN}"
            exit 1
          fi
          STATUS=$(aws ecs describe-service-deployments \
            --service-deployment-arns "${DEPLOY_ARN}" \
            --query 'serviceDeployments[0].status' \
            --output text)
          echo "Deployment ${DEPLOY_ARN} final status: ${STATUS}"
          if [[ "${STATUS}" != "SUCCESSFUL" ]]; then
            echo "::error::Deployment did not succeed (status=${STATUS})"
            exit 1
          fi
