name: Deploy API (ECS)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  # needed for reading the OIDC token and assuming the role
  id-token: write

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: eu-west-1
      DOCKER_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-production-github-actions
          role-session-name: GitHub_Deploy_API_ECS
          aws-region: eu-west-1
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: extractions/setup-just@v4
      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml
      - run: just build-image
      # Push :latest for humans/runtime, plus the commit SHA as an immutable tag
      # so each deploy gets a unique image reference (otherwise ECS Express may
      # see no diff and skip rolling a new deployment).
      - run: just push-image "${{ github.sha }}"
      - id: deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: search-api
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/search-api:${{ github.sha }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-api-ecs-task-execution-role
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-api-ecs-infrastructure-role
