name: Deploy Prefect to Production

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  # needed for reading the OIDC token and assuming the role
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
        with:
          just-version: 1.36.0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: just install
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/search-production-github-actions
          role-session-name: GithubSearchDeploy
          aws-region: eu-west-1
      - uses: aws-actions/amazon-ecr-login@v2
      - run: just prefect-build
      - run: just prefect-push
      - run: just prefect-deploy
        env:
          DOCKER_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
          GIT_BRANCH: ${{ github.ref_name }}
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
